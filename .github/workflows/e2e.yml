name: e2e

on:
  workflow_run:
    workflows: ["update-playwright-snapshots"]
    types:
      - completed
    branches:
      - master

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: eu-central-1

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - uses: actions/checkout@v7
    - name: Install pnpm
      uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: |
        pnpm install
        pnpm test
        pnpm exec playwright install --with-deps
    - name: Download snapshots
      run: aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/blog/ tests/__snapshots__/
    - name: Run e2e tests
      run: pnpm e2e
    - name: Upload possibly new snapshots
      if: always()
      run: aws s3 sync tests/__snapshots__/ s3://${{ secrets.S3_BUCKET_NAME }}/blog/
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
